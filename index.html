<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scrollwise</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/scrollwise-180.png" />
  <meta name="theme-color" content="#6a4428" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Scrollwise" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="setup" class="setup">
      <div class="brand">
        <div class="seal">S</div>
        <div>
          <h1>Scrollwise</h1>
          <p>Din egenvalda scroll genom minnets bibliotek.</p>
        </div>
      </div>

      <div class="panel">
        <label for="csvUrl">Google Sheet / CSV-länk</label>
        <input id="csvUrl" type="url" placeholder="Klistra in publicerad CSV-länk…" />
        <button id="loadBtn">Ladda feed</button>
        <button id="loadLocalCsvBtn" class="secondary" type="button">Ladda lokal CSV-fil</button>
        <input id="csvFileInput" class="hiddenInput" type="file" accept=".csv,text/csv" />
        <button id="demoBtn" class="secondary">Testa med demokort</button>

        <div class="imagePickerBox">
          <button id="pickImagesBtn" class="secondary" type="button">Välj bildminnen</button>
          <input id="imageInput" class="hiddenInput" type="file" accept="image/*" multiple />
          <p id="imageStatus" class="imageStatus">Inga egna bilder valda. Appen använder blekta stock-fragment.</p>
        </div>

        <p class="hint">
          Klistra in en Google Sheets-/CSV-länk eller ladda lokal CSV. Biblioteket sparas lokalt på enheten.
        </p>
      </div>
    </section>

    <section id="feed" class="feed hidden">
      <header class="topbar">
        <button id="backBtn" class="ghost">← Källa</button>
        <div class="titleBlock">
          <strong>Scrollwise</strong>
          <span id="deckInfo">Demofeed</span>
        </div>
        <button id="resetBtn" class="ghost">Nollställ</button>
      </header>

      <div class="feedTools">
        <button id="pickImagesBtnFeed" class="ghost" type="button">＋ bilder</button>
        <button id="exportStateBtn" class="ghost" type="button">⇩ export</button>
        <button id="importStateBtn" class="ghost" type="button">⇧ import</button>
        <input id="stateFileInput" class="hiddenInput" type="file" accept=".json,application/json" />
        <span id="imageStatusFeed">stock-fragment</span>
      </div>

      <div id="cardStage" class="cardStage">
        <article id="nextCard" class="card previewCard" aria-hidden="true">
          <div class="cardPaper">
            <div id="nextVisualBadge" class="visualBadge"></div>
            <div id="nextImage" class="memoryImage"></div>
            <p id="nextCardText"></p>
          </div>
        </article>

        <article id="card" class="card activeCard">
          <div class="cardPaper">
            <div id="visualBadge" class="visualBadge"></div>
            <div id="cardImage" class="memoryImage"></div>
            <p id="cardText"></p>
            <button id="noteBtn" class="noteBtn" type="button" title="Marginalanteckning">✎</button>
            <div class="cardMeta">
              <span id="rowMeta"></span>
              <span id="statusMeta"></span>
            </div>
          </div>
        </article>
      </div>

      <footer class="actions">
        <button id="lessBtn" title="Visa mer sällan">← mer sällan</button>
        <button id="prevBtn" title="Tillbaka ett kort">↓ tillbaka</button>
        <button id="nextBtn" title="Nästa kort">↑ nästa</button>
        <button id="starBtn" title="Stjärnmarkera">★ oftare</button>
      </footer>
    </section>
  </main>

  <div id="noteModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modalBox">
      <h2>Marginalanteckning</h2>
      <p id="noteCardPreview" class="noteCardPreview"></p>
      <textarea id="noteText" placeholder="Skriv en tanke, association eller kommentar…"></textarea>
      <div class="modalActions">
        <button id="saveNoteBtn">Spara</button>
        <button id="deleteNoteBtn" class="secondary">Ta bort</button>
        <button id="closeNoteBtn" class="secondary">Stäng</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
